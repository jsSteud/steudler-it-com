AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Tanzwertung – serverless Backend (API Gateway + Lambda + DynamoDB).
  Das Frontend (Ordner public/) liegt statisch auf S3 und pollt dieses Backend per REST.

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        TABLE_NAME: !Ref RatingsTable

Resources:
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  RatingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  GetStateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/
      Handler: getState.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RatingsTable
      Events:
        GetState:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /state
            Method: GET

  RateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/
      Handler: rate.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RatingsTable
      Events:
        Rate:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /rate
            Method: POST

  ResetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/
      Handler: reset.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RatingsTable
      Events:
        Reset:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /reset
            Method: POST

Outputs:
  ApiUrl:
    Description: Basis-URL der REST-API – in public/config.js als TANZWERTUNG_API_BASE eintragen
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/Prod"
